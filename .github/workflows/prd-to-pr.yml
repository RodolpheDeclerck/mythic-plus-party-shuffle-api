name: PRD to PR

on:
  push:
    branches:
      - dev-pipeline
    paths:
      - "docs/prd/incoming/*.md"

concurrency:
  group: prd-to-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  implement-prd:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect PRD file
        id: detect
        shell: bash
        run: |
          set +e
          PRD_FILE=$(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" | grep '^docs/prd/incoming/.*\.md$' || true | head -n 1)

          if [ -z "$PRD_FILE" ]; then
            echo "No PRD file found"
            exit 1
          fi

          BASENAME=$(basename "$PRD_FILE" .md)
          SAFE_NAME=$(echo "$BASENAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//' | sed 's/-$//')
          BRANCH_NAME="prd/${SAFE_NAME}-${{ github.run_number }}"

          MAX_TURNS_RAW=$(head -20 "$PRD_FILE" | grep -E '^max_turns:\s*[0-9]+' | head -1 | sed -E 's/^max_turns:\s*//')
          if [ -n "$MAX_TURNS_RAW" ]; then
            if [ "$MAX_TURNS_RAW" -lt 8 ]; then MAX_TURNS=8; elif [ "$MAX_TURNS_RAW" -gt 30 ]; then MAX_TURNS=30; else MAX_TURNS=$MAX_TURNS_RAW; fi
          else
            MAX_TURNS=12
          fi

          echo "prd_file=$PRD_FILE" >> "$GITHUB_OUTPUT"
          echo "safe_name=$SAFE_NAME" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "max_turns=$MAX_TURNS" >> "$GITHUB_OUTPUT"

      - name: Create working branch
        shell: bash
        run: |
          git checkout -b "${{ steps.detect.outputs.branch_name }}"

      - name: Run Claude Code
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # max_turns: default 12; override in PRD with a line "max_turns: 18" (clamped 8–30)
          max_turns: ${{ steps.detect.outputs.max_turns }}
          allowed_tools: "Bash(git:*),Bash(npm:*),Bash(mkdir:*),Read,Edit,MultiEdit,Write,LS,Glob,Grep"
          prompt: |
            You are working in an existing backend repository.

            Read the PRD here:
            ${{ steps.detect.outputs.prd_file }}

            Follow CLAUDE.md strictly. The rules in CLAUDE.md (DDD, CQRS, controller, 100% unit test coverage, integration tests when applicable) are non-negotiable and override the PRD: do not skip controller or tests even if the PRD asks for a "minimal" change.

            Architecture: you MUST respect DDD, CQRS, and Hexagonal Architecture. Every module has: presentation (controller + routes) → application (handlers, queries/commands) → domain. Controllers are thin and delegate to handlers; no business logic in controllers or routes. Follow NestJS-style layering and clean code (single responsibility, explicit naming, no logic in presentation).

            Important context:
            - the current repository is still based on Express and TypeORM
            - the target architecture is NestJS + CQRS + DDD + Hexagonal Architecture + Prisma
            - this migration is incremental and not completed yet

            For this task, do NOT attempt a full migration of the repository.

            Your mission is to implement the smallest coherent step toward the target architecture.

            Mandatory rules:
            - all new target-oriented code must go under src/modules/<bounded-context>/
            - do not create src/features/
            - do not refactor the whole existing app
            - do not modify existing Express routes unless strictly necessary
            - do not modify existing TypeORM entities unless explicitly required
            - keep the change small, focused, and committable

            You MUST deliver for every new module:
            - a controller in presentation/controllers/ (e.g. <context>.controller.ts); routes in presentation/routes/ that call the controller, never the handler directly
            - 100% unit test coverage for new code: every handler, and every application/domain file you add must have a corresponding *.test.ts that covers all code paths; run npm run test before stopping and fix any failure or missing coverage
            - when the feature adds HTTP endpoints, persistence, or external services: add integration tests (*.integration.test.ts in tests/integration/ or next to the module). Run npm run test:integration; use env POSTGRES_*, REDIS_URL as in tests/integration/connectivity.integration.test.ts

            Execution rules:
            - do not narrate progress
            - do not create todo lists
            - minimize exploration
            - start writing files as soon as the repo structure is understood
            - stop as soon as the smallest acceptable implementation is complete
            - prefer few turns: read PRD and CLAUDE.md once, then implement in one go if possible

            Constraints:
            - do not touch secrets
            - do not modify CI/CD unless strictly necessary
            - avoid unrelated changes

      - name: Show git status after Claude
        shell: bash
        run: |
          git status --short

      - name: Commit generated changes
        id: commit_changes
        env:
          PRD_FILE: ${{ steps.detect.outputs.prd_file }}
        shell: bash
        run: |
          git config user.name "prd-bot"
          git config user.email "prd-bot@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes generated"
            exit 0
          fi

          git add .
          mkdir -p docs/prd/done
          if [ -f "$PRD_FILE" ]; then
            git mv "$PRD_FILE" docs/prd/done/
          fi
          git add -A
          git commit -m "feat: implement PRD ${{ steps.detect.outputs.safe_name }}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push working branch
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          git push --force origin "${{ steps.detect.outputs.branch_name }}"

      - name: Setup Node.js
        if: steps.commit_changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          npm ci

      - name: Run audit
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: npm run audit

      - name: Run build
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          npm run build

      - name: Run lint fix
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: npm run lint:fix

      - name: Run format
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: npm run format

      - name: Commit lint and format changes
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git config user.name "prd-bot"
            git config user.email "prd-bot@users.noreply.github.com"
            git add -A
            git commit --amend --no-edit
            git push --force origin "${{ steps.detect.outputs.branch_name }}"
          fi

      - name: Run lint
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: npm run lint

      - name: Run format check
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: npm run format:check

      - name: Run unit tests
        if: steps.commit_changes.outputs.has_changes == 'true'
        shell: bash
        run: npm run test

      - name: Wait for Postgres and Redis
        if: steps.commit_changes.outputs.has_changes == 'true'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client redis-tools >/dev/null
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres 2>/dev/null && redis-cli -h 127.0.0.1 -p 6379 ping 2>/dev/null | grep -q PONG; then
              echo "Postgres and Redis are ready"
              exit 0
            fi
            echo "Waiting for services... ($i/30)"
            sleep 2
          done
          echo "Services did not become ready"
          exit 1

      - name: Run integration tests
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
          REDIS_URL: redis://127.0.0.1:6379
        shell: bash
        run: node tests/integration/connectivity.cjs

      # Smoke test disabled: server requires .env + Postgres to start.
      # Re-enable when CI has Docker/DB or app supports start-without-DB.

      - name: Create pull request
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRD_FILE: ${{ steps.detect.outputs.prd_file }}
        shell: bash
        run: |
          PRD_DONE="docs/prd/done/$(basename "$PRD_FILE")"
          gh pr create \
            --base dev-pipeline \
            --head "${{ steps.detect.outputs.branch_name }}" \
            --title "feat: implement ${{ steps.detect.outputs.safe_name }}" \
            --body-file "$PRD_DONE"