name: PRD to PR

on:
  push:
    branches:
      - dev-pipeline
    paths:
      - "docs/prd/incoming/*.md"

concurrency:
  group: prd-to-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  implement-prd:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      # ── 1. Setup ────────────────────────────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── 2. Detect PRD ───────────────────────────────────────────────────────

      - name: Detect PRD file
        id: detect
        shell: bash
        run: |
          set +e
          PRD_FILE=$(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" \
            | grep '^docs/prd/incoming/.*\.md$' || true | head -n 1)

          if [ -z "$PRD_FILE" ]; then
            echo "No PRD file found"
            exit 1
          fi

          BASENAME=$(basename "$PRD_FILE" .md)
          SAFE_NAME=$(echo "$BASENAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')
          BRANCH_NAME="prd/${SAFE_NAME}-${{ github.run_number }}"

          MAX_TURNS_RAW=$(head -20 "$PRD_FILE" \
            | grep -E '^max_turns:\s*[0-9]+' | head -1 \
            | sed -E 's/^max_turns:\s*//')
          if [ -n "$MAX_TURNS_RAW" ]; then
            if   [ "$MAX_TURNS_RAW" -lt 8  ]; then MAX_TURNS=8
            elif [ "$MAX_TURNS_RAW" -gt 30 ]; then MAX_TURNS=30
            else MAX_TURNS=$MAX_TURNS_RAW
            fi
          else
            MAX_TURNS=12
          fi

          echo "prd_file=$PRD_FILE"       >> "$GITHUB_OUTPUT"
          echo "safe_name=$SAFE_NAME"     >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "max_turns=$MAX_TURNS"     >> "$GITHUB_OUTPUT"

      - name: Create working branch
        run: git checkout -b "${{ steps.detect.outputs.branch_name }}"

      # ── 3. Claude Code generates the implementation ─────────────────────────

      - name: Run Claude Code
        uses: anthropics/claude-code-base-action@beta
        env:
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:3000
          JWT_SECRET: ci-test-secret
          DOMAIN: localhost
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
          REDIS_URL: redis://127.0.0.1:6379
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_turns: ${{ steps.detect.outputs.max_turns }}
          allowed_tools: "Bash(git:*),Bash(npm:*),Bash(mkdir:*),Read,Edit,MultiEdit,Write,LS,Glob,Grep"
          prompt: |
            You are working in an existing backend repository.

            Read the PRD here: ${{ steps.detect.outputs.prd_file }}
            Read and strictly follow CLAUDE.md — its rules are non-negotiable and override the PRD.

            ## Your mission
            Implement what the PRD describes, following the DDD + CQRS + Hexagonal structure defined in CLAUDE.md.

            ## Mandatory deliverables for any module with an application layer and HTTP exposure
            1. `application/`: query or command, handler (`*.handler.ts`), DTO
            2. `presentation/`: controller (`*.controller.ts`), routes (`*.routes.ts`)
               - routes call the controller; controller delegates to handler; no business logic in either
            3. Wire new routes in `src/app.ts` via `app.use('/api', ...)`
            4. Unit tests: every handler and application/domain file must have a `*.test.ts` next to it
               - run `npm run test:coverage`, open `coverage/coverage-summary.json`
               - every file you added under `src/modules/` (excluding `*.test.ts`) must have `lines.pct === 100`
               - fix any gap before moving on
            5. Integration tests (non-negotiable — see CLAUDE.md):
               - ANY new HTTP endpoint → `*.integration.test.ts` using supertest on the real Express app
               - ANY new persistence → integration test using real DB env vars
               - ANY new external service → integration test using real Redis/etc.
               - Exception: do NOT generate integration tests for shuffle/composition logic
               - Run `npm run test:integration` and fix any failure

            ## Definition of done (check each before git add)
            - [ ] `npm run build` passes
            - [ ] `npm run lint` passes
            - [ ] `npm run format:check` passes
            - [ ] `npm run test` passes with 100% coverage on new files
            - [ ] `npm run test:integration` passes
            - [ ] handler + controller + routes exist and are wired in app.ts
            - [ ] every handler has a `*.handler.test.ts` next to it
            - [ ] every new HTTP route has a `*.integration.test.ts`

            Do NOT run `git add` until every item above is checked.

            ## Context
            - Current stack: Express + TypeORM (legacy, do not refactor)
            - Target stack: NestJS + CQRS + DDD + Hexagonal + Prisma (incremental migration)
            - Already migrated: `src/modules/health/`, `src/modules/version/`
            - New modules go under `src/modules/<bounded-context>/`

            ## Constraints
            - Do not touch `.github/`, `infra/`, `terraform/`, `secrets/`, `docker-compose.yml`
            - Do not modify legacy controllers, routes, or TypeORM entities unless the PRD explicitly requires it
            - Do not attempt a full migration
            - Keep the PR small and focused on the PRD scope
            - Do not narrate progress or create todo lists — implement directly

      # ── 4. Validate structure (DDD/CQRS complete) ──────────────────────────

      - name: Check module structure (handler + controller + routes)
        shell: bash
        run: |
          err=""
          for mod in src/modules/*/; do
            [ -d "$mod" ] || continue
            name=$(basename "$mod")
            has_app=$(find "$mod" -path "*/application/*.ts" -not -name "*.test.ts" 2>/dev/null | head -1)
            [ -n "$has_app" ] || continue
            handlers=$(find    "$mod" -path "*/handlers/*.handler.ts"    2>/dev/null | wc -l)
            controllers=$(find "$mod" -path "*/controllers/*.ts"         2>/dev/null | wc -l)
            routes=$(find      "$mod" -path "*/routes/*.ts"              2>/dev/null | wc -l)
            if [ "$handlers"    -eq 0 ]; then err="${err}${name}: missing handler (application/handlers/*.handler.ts). "; fi
            if [ "$controllers" -eq 0 ]; then err="${err}${name}: missing controller (presentation/controllers/*.ts). "; fi
            if [ "$routes"      -eq 0 ]; then err="${err}${name}: missing routes (presentation/routes/*.ts). "; fi
          done
          if [ -n "$err" ]; then
            echo "::error::Incomplete DDD/CQRS module — do not commit: $err"
            exit 1
          fi
          echo "All modules with application layer have handler + controller + routes."

      - name: Check handlers have unit tests
        shell: bash
        run: |
          missing=""
          for f in $(find src/modules -name "*.handler.ts" -not -name "*.test.ts" 2>/dev/null); do
            dir=$(dirname "$f")
            base=$(basename "$f" .handler.ts)
            if [ ! -f "$dir/$base.handler.test.ts" ] && [ ! -f "$dir/$base.test.ts" ]; then
              missing="$missing"$'\n'"  - $f"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Every handler must have a unit test. Missing:$missing"
            exit 1
          fi
          echo "All handlers have unit tests."

      # ── 5. Build + quality checks ───────────────────────────────────────────

      - name: Build
        run: npm run build

      - name: Lint fix + format (auto-correct)
        run: |
          npm run lint:fix
          npm run format

      - name: Lint check
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Audit
        run: npm run audit

      # ── 6. Tests (unit then integration) — must pass before commit ──────────

      - name: Unit tests
        run: npm run test

      - name: Unit tests coverage (100% on new modules)
        run: npm run test:coverage

      - name: Wait for Postgres and Redis
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client redis-tools >/dev/null
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres 2>/dev/null \
              && redis-cli -h 127.0.0.1 -p 6379 ping 2>/dev/null | grep -q PONG; then
              echo "Postgres and Redis are ready"
              exit 0
            fi
            echo "Waiting for services... ($i/30)"
            sleep 2
          done
          echo "Services did not become ready in time"
          exit 1

      - name: Connectivity check
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
          REDIS_URL: redis://127.0.0.1:6379
        run: node tests/integration/connectivity.cjs

      - name: Integration tests
        env:
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:3000
          JWT_SECRET: ci-test-secret
          DOMAIN: localhost
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
          REDIS_URL: redis://127.0.0.1:6379
        run: npm run test:integration

      # ── 7. Commit + push + PR (only if everything above is green) ───────────

      - name: Commit generated changes
        id: commit_changes
        env:
          PRD_FILE: ${{ steps.detect.outputs.prd_file }}
        shell: bash
        run: |
          git config user.name  "prd-bot"
          git config user.email "prd-bot@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes generated"
            exit 0
          fi

          git add .
          mkdir -p docs/prd/done
          if [ -f "$PRD_FILE" ]; then
            git mv "$PRD_FILE" docs/prd/done/
          fi
          git add -A
          git commit -m "feat: implement PRD ${{ steps.detect.outputs.safe_name }}"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Push working branch
        if: steps.commit_changes.outputs.has_changes == 'true'
        run: git push --force origin "${{ steps.detect.outputs.branch_name }}"

      - name: Create pull request
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRD_FILE: ${{ steps.detect.outputs.prd_file }}
        shell: bash
        run: |
          PRD_DONE="docs/prd/done/$(basename "$PRD_FILE")"
          gh pr create \
            --base dev-pipeline \
            --head "${{ steps.detect.outputs.branch_name }}" \
            --title "feat: implement ${{ steps.detect.outputs.safe_name }}" \
            --body-file "$PRD_DONE"